<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="/favicon.png?v=3">
  <title>AlgoSync Authentication</title>
  <style>
    body {
      background-color: #0d1117;
      color: #c9d1d9;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      text-align: center;
    }
    .container {
      background: #161b22;
      padding: 40px;
      border-radius: 12px;
      border: 1px solid #30363d;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }
    h2 {
      margin-top: 0;
      color: #58a6ff;
    }
    p {
      opacity: 0.8;
      font-size: 14px;
    }
    .spinner {
      margin-top: 20px;
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255,255,255,0.1);
      border-left-color: #58a6ff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container" id="message-container">
    <img src="favicon.png?v=2" alt="AlgoSync Logo" style="width: 80px; height: 80px; margin-bottom: 12px; border-radius: 12px;">
    <h2>AlgoSync Authentication</h2>
    <p>Click the button below to securely connect your GitHub account.</p>
    <button id="login-btn" style="background: #2ea043; color: white; border: none; padding: 10px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 16px; font-size: 14px;">
      Proceed to GitHub
    </button>
  </div>

  <!-- Note: We use standard Firebase SDK here since it's a web page, not an extension tab -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  
  <script src="login.js?v=3"></script>
</body>
</html>
